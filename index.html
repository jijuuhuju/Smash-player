<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>longer BROS Advance</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; }
        h1 { margin: 5px 0; font-size: 1.5rem; color: #007bff; text-align: center; }
        
        /* 画面切り替え用の共通設定 */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; box-sizing: border-box; padding: 20px; }
        .active { display: flex; }

        /* セレクト画面のスタイル */
        .menu-title { font-size: 1.2rem; margin: 15px 0 5px; color: #aaa; }
        .grid-select { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .char-btn { font-size: 2rem; background: #333; border: 2px solid #555; border-radius: 12px; padding: 10px; cursor: pointer; transition: 0.2s; }
        .char-btn.selected { border-color: #007bff; background: #1a237e; transform: scale(1.1); }
        .mode-btn, .diff-btn { background: #444; color: white; border: none; padding: 12px 25px; margin: 5px; font-size: 1rem; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .mode-btn.selected, .diff-btn.selected { background: #28a745; }
        .start-btn { background: #007bff; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; font-weight: bold; margin-top: 25px; box-shadow: 0 4px 10px rgba(0,123,255,0.4); }

        /* ゲーム画面のスタイル */
        canvas { background: #111; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 2px solid #444; max-width: 100%; max-height: 45vh; }
        .ui-container { display: flex; justify-content: space-around; width: 480px; max-width: 100%; margin: 5px 0; font-weight: bold; font-size: 1.3rem; }
        .p1-ui { color: #007bff; }
        .p2-ui { color: #dc3545; }
        
        /* スマホ用十字コントローラー＋ボタン */
        .game-layout { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .controller { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 95%; max-width: 500px; margin-top: 8px; }
        .btn { background: #444; color: white; border: none; padding: 15px 5px; font-size: 1rem; font-weight: bold; border-radius: 10px; text-align: center; }
        .btn:active { background: #666; }
        .btn-attack { background: #007bff; }
        .btn-smash { background: #e0a800; color: #000; }
        .back-btn { position: absolute; top: 10px; left: 10px; background: #555; color: #fff; border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- 1. 設定・セレクト画面 -->
    <div id="select-screen" class="screen active">
        <h1>longer BROS</h1>
        
        <div class="menu-title">① あなたの絵文字（コスチューム）を選択</div>
        <div class="grid-select">
            <button class="char-btn selected" onclick="selectChar('🦊')">🦊</button>
            <button class="char-btn" onclick="selectChar('🐻')">🐻</button>
            <button class="char-btn" onclick="selectChar('😀')">😀</button>
            <button class="char-btn" onclick="selectChar('🦉')">🦉</button>
        </div>

        <div class="menu-title">② モードを選択</div>
        <div>
            <button id="mode-cpu" class="mode-btn selected" onclick="selectMode('cpu')">CPUと戦う</button>
            <button id="mode-sand" class="mode-btn" onclick="selectMode('sandbag')">1人で練習 (サンドバック)</button>
        </div>

        <div id="diff-section">
            <div class="menu-title">③ CPUの難易度を選択</div>
            <div>
                <button id="diff-easy" class="diff-btn selected" onclick="selectDiff('easy')">よわい</button>
                <button id="diff-hard" class="diff-btn" onclick="selectDiff('hard')">つよい</button>
            </div>
        </div>

        <button class="start-btn" onclick="gameStart()">バトル開始！</button>
    </div>

    <!-- 2. バトル本編画面 -->
    <div id="game-screen" class="screen">
        <button class="back-btn" onclick="backToMenu()">メニューに戻る</button>
        <div class="ui-container">
            <div class="p1-ui"><span id="p1-emoji">🦊</span> (あなた): <span id="p1-percent">0</span>%</div>
            <div class="p2-ui"><span id="p2-name">👾</span>: <span id="p2-percent">0</span>%</div>
        </div>

        <div class="game-layout">
            <canvas id="stage" width="480" height="270"></canvas>

            <!-- スマホ操作用ボタン (上タッチ/下タッチ対応) -->
            <div class="controller">
                <button class="btn" id="btn-left">← 左</button>
                <button class="btn" id="btn-up">▲ 上 (跳)</button>
                <button class="btn" id="btn-down">▼ 下 (伏)</button>
                <button class="btn" id="btn-right">右 →</button>
                <button class="btn btn-attack" id="btn-atk">攻撃</button>
                <button class="btn btn-smash" id="btn-smash" style="grid-column: span 5; padding: 10px;">スマッシュ攻撃</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("stage");
        const ctx = canvas.getContext("2d");
        const platform = { x: 90, y: 180, width: 300, height: 15 };

        // ゲーム状態設定用変数
        let selectedEmoji = '🦊';
        let gameMode = 'cpu'; // 'cpu' or 'sandbag'
        let difficulty = 'easy'; // 'easy' or 'hard'
        let gameActive = false;

        // キャラクタークラス
        class Character {
            constructor(x, y, emoji, isCPU) {
                this.x = x; this.y = y;
                this.width = 24; this.height = 24;
                this.emoji = emoji; this.isCPU = isCPU;
                this.vx = 0; this.vy = 0;
                this.percent = 0; this.jumpCount = 0;
                this.facing = 1; // 1: 右, -1: 左
                this.isCrouching = false;
                this.attackEffect = null; // 技のエフェクト描画用
            }

            update() {
                // 重力（しゃがみ時は急降下）
                this.vy += this.isCrouching ? 0.8 : 0.4;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.95; // 摩擦による減速

                // しゃがみ状態の高さ変化
                this.height = this.isCrouching ? 14 : 24;

                // 足場着地判定
                if (this.x + this.width > platform.x && this.x < platform.x + platform.width) {
                    let currentY = this.isCrouching ? platform.y - 14 : platform.y - 24;
                    if (this.y >= currentY && this.y - this.vy <= currentY + 8) {
                        this.y = currentY;
                        this.vy = 0;
                        this.jumpCount = 0;
                    }
                }

                // バーストゾーン判定
                if (this.x < -60 || this.x > canvas.width + 60 || this.y > canvas.height + 60 || this.y < -120) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.font = this.isCrouching ? "18px sans-serif" : "24px sans-serif";
                ctx.textAlign = "center";
                
                // 向きに合わせて反転
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                if (this.facing === -1) ctx.scale(-1, 1);
                ctx.fillText(this.emoji, 0, this.isCrouching ? 6 : 8);
                ctx.restore();

                // 攻撃エフェクトの描画
                if (this.attackEffect) {
                    ctx.fillStyle = this.attackEffect.color;
                    ctx.fillRect(this.attackEffect.x, this.attackEffect.y, this.attackEffect.w, this.attackEffect.h);
                    this.attackEffect.timer--;
                    if (this.attackEffect.timer <= 0) this.attackEffect = null;
                }
            }

            jump() {
                if (this.jumpCount < 2) {
                    this.vy = -7.5;
                    this.jumpCount++;
                    this.isCrouching = false;
                }
            }

            reset() {
                this.percent = 0; this.vx = 0; this.vy = 0;
                this.x = this.isCPU ? 320 : 130;
                this.y = 100;
                this.isCrouching = false;
                updateUI();
            }
        }

        let p1 = new Character(130, 100, '🦊', false);
        let p2 = new Character(320, 100, '👾', true);

        // キャラクター別固有攻撃処理
        function executeAttack(attacker, target, isSmash) {
            if (attacker.isCrouching) return; // しゃがみ中は攻撃不可

            let rangeX = 35; let rangeY = 25;
            let damage = isSmash ? 14 : 5;
            let kbMultiplier = isSmash ? 1.2 : 0.5;
            let effectColor = "rgba(255,255,255,0.4)";

            // 絵文字ごとの特性分岐
            if (!attacker.isCPU) {
                if (attacker.emoji === '🦊') { // キツネ: 火炎放射
                    if (isSmash) { rangeX = 70; effectColor = "rgba(255,69,0,0.6)"; damage = 12; }
                } else if (attacker.emoji === '🐻') { // クマ: メガトン
                    if (isSmash) { rangeX = 40; kbMultiplier = 1.8; damage = 20; effectColor = "rgba(255,215,0,0.6)"; }
                } else if (attacker.emoji === '😀') { // ニコちゃん: レーザー
                    if (isSmash) { rangeX = 180; rangeY = 10; damage = 10; effectColor = "rgba(0,255,255,0.7)"; }
                } else if (attacker.emoji === '🦉') { // フクロウ: 竜巻
                    if (isSmash) { rangeY = 80; rangeX = 40; kbMultiplier = 1.0; effectColor = "rgba(200,200,200,0.5)"; }
                }
            }

            // エフェクトセット
            let fx = attacker.facing === 1 ? attacker.x + attacker.width : attacker.x - rangeX;
// 当たり判定let hit = false;if (attacker.facing === 1 && target.x >= attacker.x && target.x <= attacker.x + attacker.width + rangeX) hit = true;if (attacker.facing === -1 && target.x + target.width >= attacker.x - rangeX && target.x <= attacker.x) hit = true;if (hit && Math.abs(attacker.y - target.y) < rangeY) {if (target.isCrouching) { damage = Math.floor(damage * 0.5); } // 敵がしゃがんでいたらダメージ半減target.percent += damage;let knockback = (target.percent / 9) + (isSmash ? 8 : 3);target.vx = attacker.facing * knockback * kbMultiplier;// フクロウのスマッシュは上空へ、その他は斜め上へ吹っ飛ぶtarget.vy = (attacker.emoji === '🦉' && isSmash) ? -knockback * 1.3 : -knockback * 0.5;updateUI();}}// メニュー画面の選択管理関数function selectChar(emoji) {selectedEmoji = emoji;document.querySelectorAll('.grid-select .char-btn').forEach(b => b.classList.remove('selected'));event.target.classList.add('selected');}function selectMode(mode) {gameMode = mode;document.getElementById('mode-cpu').classList.toggle('selected', mode === 'cpu');document.getElementById('mode-sand').classList.toggle('selected', mode === 'sandbag');document.getElementById('diff-section').style.display = mode === 'cpu' ? 'block' : 'none';}function selectDiff(diff) {difficulty = diff;document.getElementById('diff-easy').classList.toggle('selected', diff === 'easy');document.getElementById('diff-hard').classList.toggle('selected', diff === 'hard');}function gameStart() {document.getElementById('select-screen').classList.remove('active');document.getElementById('game-screen').classList.add('active');p1.emoji = selectedEmoji;document.getElementById('p1-emoji').innerText = selectedEmoji;if (gameMode === 'sandbag') {p2.emoji = '🪵';document.getElementById('p2-name').innerText = 'サンドバック';} else {p2.emoji = '👾';document.getElementById('p2-name').innerText = 'CPU';}p1.reset(); p2.reset();gameActive = true;}function backToMenu() {gameActive = false;document.getElementById('game-screen').classList.remove('active');document.getElementById('select-screen').classList.add('active');}function updateUI() {document.getElementById("p1-percent").innerText = p1.percent;document.getElementById("p2-percent").innerText = p2.percent;}// --- 操作イベントの登録 ---let keys = { left: false, right: false };// キーボード操作設定window.addEventListener("keydown", e => {if (!gameActive) return;if (e.key === "ArrowLeft" || e.key === "a") { keys.left = true; p1.facing = -1; }if (e.key === "ArrowRight" || e.key === "d") { keys.right = true; p1.facing = 1; }if (e.key === "ArrowUp" || e.key === "w") p1.jump();if (e.key === "ArrowDown" || e.key === "s") p1.isCrouching = true;if (e.key === "f") executeAttack(p1, p2, false);if (e.key === "g") executeAttack(p1, p2, true);});window.addEventListener("keyup", e => {if (e.key === "ArrowLeft" || e.key === "a") keys.left = false;if (e.key === "ArrowRight" || e.key === "d") keys.right = false;if (e.key === "ArrowDown" || e.key === "s") p1.isCrouching = false;});// スマホ用タッチ操作共通化設定const setupBtn = (id, startFn, endFn) => {const btn = document.getElementById(id);btn.addEventListener("touchstart", (e) => { e.preventDefault(); startFn(); });if(endFn) btn.addEventListener("touchend", (e) => { e.preventDefault(); endFn(); });btn.addEventListener("mousedown", startFn);if(endFn) btn.addEventListener("mouseup", endFn);};setupBtn("btn-left", () => { keys.left = true; p1.facing = -1; }, () => keys.left = false);setupBtn("btn-right", () => { keys.right = true; p1.facing = 1; }, () => keys.right = false);setupBtn("btn-up", () => p1.jump());setupBtn("btn-down", () => p1.isCrouching = true, () => p1.isCrouching = false);setupBtn("btn-atk", () => executeAttack(p1, p2, false));setupBtn("btn-smash", () => executeAttack(p1, p2, true));// --- CPU・AIの思考ロジック ---function updateCPU() {if (gameMode === 'sandbag') return; // 練習モードなら動かないlet speed = difficulty === 'hard' ? 1.5 : 0.7;let attackChance = difficulty === 'hard' ? 0.05 : 0.015;// ステージ復帰判定if (p2.x < platform.x || p2.x > platform.x + platform.width) {if (Math.random() < 0.03) p2.jump();}// プレイヤーを追跡if (p2.x < p1.x) { p2.x += speed; p2.facing = 1; }else { p2.x -= speed; p2.facing = -1; }// 一定確率でしゃがみ回避を模倣if (difficulty === 'hard' && Math.random() < 0.005) {p2.isCrouching = !p2.isCrouching;}// 間合いに入ったら攻撃if (Math.abs(p2.x - p1.x) < 35 && Math.random() < attackChance) {p2.isCrouching = false;executeAttack(p2, p1, Math.random() < 0.3);}}// --- メインループ ---function loop() {if (gameActive) {ctx.clearRect(0, 0, canvas.width, canvas.height);if (keys.left) p1.vx = -2.8;if (keys.right) p1.vx = 2.8;p1.update();updateCPU();p2.update();// 足場の描画ctx.fillStyle = "#555";ctx.fillRect(platform.x, platform.y, platform.width, platform.height);p1.draw();p2.draw();}requestAnimationFrame(loop);}loop();            attacker.attackEffect = { x: fx, y: attacker.y - (rangeY-24)/2, w: rangeX, h: rangeY, color: effectColor, timer: 8 };
