<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>longer BROS GOD</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; user-select: none; }
        .screen { display: none; } .active { display: flex; flex-direction: column; align-items: center; }
        .char-btn, .mode-btn { font-size: 1.4rem; background: #444; color: #fff; border: 2px solid #666; padding: 8px; margin: 4px; border-radius: 8px; }
        .selected { border-color: #007bff; background: #1a237e; }
        canvas { background: #111; display: block; margin: 5px auto; border: 2px solid #444; }
        .btn { background: #555; color: #fff; border: none; padding: 15px; margin: 2px; font-weight: bold; border-radius: 8px; width: 85px; font-size: 1rem; touch-action: manipulation; }
        .hp-b { width: 140px; height: 12px; background: #444; border: 1px solid #aaa; display: inline-block; border-radius: 6px; overflow: hidden; vertical-align: middle; }
        .hp-f { height: 100%; background: #28a745; width: 100%; transition: width 0.1s; }
    </style>
</head>
<body>
    <div id="sel-scr" class="screen active">
        <h3>キャラクター / モード 選択</h3>
        <div><button class="char-btn selected" onclick="sCh('🦊')">🦊</button><button class="char-btn" onclick="sCh('🐻')">🐻</button><button class="char-btn" onclick="sCh('😀')">😀</button><button class="char-btn" onclick="sCh('🦉')">🦉</button></div><br>
        <div><button id="m-cpu" class="mode-btn selected" onclick="sMd('cpu')">CPU(弱)</button><button id="m-cpu2" class="mode-btn" onclick="sMd('cpu2')">CPU(強神)</button><button id="m-sd" class="mode-btn" onclick="sMd('sand')">練習</button></div><br>
        <button style="background:#007bff; color:#fff; padding:12px 40px; border-radius:25px; font-size:1.2rem; font-weight:bold;" onclick="gSt()">バトル開始</button>
    </div>
    <div id="gm-scr" class="screen">
        <div style="font-size:1.1rem; margin-bottom:5px;">
            <span id="p1-e">🦊</span>: <div class="hp-b"><div id="p1-bar" class="hp-f"></div></div> (<span id="p1-p">1000</span>) vs 
            <span id="p2-e">👾</span>: <div class="hp-b"><div id="p2-bar" class="hp-f" style="background:#dc3545;"></div></div> (<span id="p2-p">1000</span>)
        </div>
        <canvas id="stage" width="480" height="200"></canvas>
        <div>
            <button class="btn" id="b-l">←左</button><button class="btn" id="b-u">▲飛</button><button class="btn" id="b-d">▼伏</button><button class="btn" id="b-r">右→</button>
            <br><button class="btn" id="b-a" style="width:174px; background:#007bff;">通常攻撃</button><button class="btn" id="b-s" style="width:174px; background:#e0a800;">スマッシュ</button>
        </div>
    </div>
    <script>
        const cvs = document.getElementById("stage"), ctx = cvs.getContext("2d"), pf = {x:100, y:140, w:280, h:10};
        let cCh='🦊', cMd='cpu', gAc=false, keys={l:false, r:false}, pAtkTime=0;
        class Char {
            constructor(x, y, e, isC) { this.x=x; this.y=y; this.e=e; this.isC=isC; this.vx=0; this.vy=0; this.p=1000; this.jc=0; this.f=1; this.cr=false; this.ef=null; this.hmt=0; }
            up() {
                this.vy += this.cr ? 0.8 : 0.4; this.x += this.vx; this.y += this.vy; this.vx *= 0.85; this.h = this.cr ? 14 : 24; if(this.hmt>0) this.hmt--;
                if (this.x+20 > pf.x && this.x < pf.x+pf.w && this.y >= pf.y-this.h && this.y-this.vy <= pf.y-this.h+8) { this.y=pf.y-this.h; this.vy=0; this.jc=0; }
                if (this.x < -40 || this.x > 520 || this.y > 240 || this.y < -100) this.p = 0;
                if (this.p <= 0) { alert(this.isC ? "あなたの勝ち！" : "あなたの負け..."); this.p=1000; p1.p=1000; p2.p=1000; this.x=this.isC?300:160; this.y=50; this.vx=0; this.vy=0; uUi(); }
            }
            dr() { ctx.save(); ctx.font=this.cr?"16px s-serif":"24px s-serif"; ctx.translate(this.x+10, this.y+10); if(this.f===-1) ctx.scale(-1,1); ctx.fillText(this.e,0,this.cr?5:8); ctx.restore(); if(this.ef){ ctx.fillStyle=this.ef.c; ctx.fillRect(this.ef.x,this.ef.y,this.ef.w,this.ef.h); if(--this.ef.t<=0)this.ef=null; } }
            jp() { if(this.jc<2) { this.vy=-7; this.jc++; this.cr=false; } }
        }
        let p1=new Char(160,50,'🦊',false), p2=new Char(300,50,'👾',true);
        function sCh(e){ cCh=e; document.querySelectorAll('.char-btn').forEach(b=>b.classList.remove('selected')); event.target.classList.add('selected'); }
        function sMd(m){ cMd=m; document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('selected')); event.target.classList.add('selected'); }
        function gSt(){ document.getElementById('sel-scr').classList.remove('active'); document.getElementById('gm-scr').classList.add('active'); p1.e=cCh; document.getElementById('p1-e').innerText=cCh; p2.e=(cMd==='sand')?'🪵':'👾'; document.getElementById('p2-e').innerText=p2.e; p1.p=1000; p2.p=1000; uUi(); gAc=true; }
        function uUi(){ document.getElementById("p1-p").innerText=p1.p; document.getElementById("p2-p").innerText=p2.p; document.getElementById("p1-bar").style.width=(p1.p/10)+"%"; document.getElementById("p2-bar").style.width=(p2.p/10)+"%"; }
        function atk(a, t, s) {
            if(a.cr) return; if(!a.isC) pAtkTime=10; let rx=s?50:30, ry=25, d=s?120:40, c=a.isC?"rgba(150,0,255,0.5)":"rgba(255,255,255,0.4)";
            if(!a.isC){ if(a.e==='🦊'&&s){rx=75; c="orange";} if(a.e==='🐻'&&s){d=200; c="gold";} if(a.e==='😀'&&s){rx=160; ry=10; c="cyan";} if(a.e==='🦉'&&s){ry=70; c="gray";} }
            let fx=a.f===1?a.x+20:a.x-rx; a.ef={x:fx, y:a.y, w:rx, h:ry, c:c, t:6};
            let h=(a.f===1 && t.x>=a.x && t.x<=a.x+20+rx)||(a.f===-1 && t.x+20>=a.x-rx && t.x<=a.x);
            if(h && Math.abs(a.y-t.y)<ry){ if(t.cr) d=Math.floor(d*0.5); if(t.hmt>15&&a.isC===false){t.vx=-a.f*7;t.vy=-3;return;} t.hmt+=10; t.p=Math.max(0,t.p-d); t.vx=a.f*(s?7:4); t.vy=s?-4.5:-2.5; uUi(); }
        }
        const sBt=(id,sFn,eFn)=>{ const b=document.getElementById(id); b.addEventListener("touchstart",(e)=>{e.preventDefault();sFn();},{passive:false}); if(eFn)b.addEventListener("touchend",(e)=>{e.preventDefault();eFn();},{passive:false}); b.addEventListener("mousedown",sFn); if(eFn)b.addEventListener("mouseup",eFn); };
        sBt("b-l",()=>{keys.l=true;p1.f=-1;},()=>{keys.l=false;}); sBt("b-r",()=>{keys.r=true;p1.f=1;},()=>{keys.r=false;}); sBt("b-u",()=>{p1.jp();}); sBt("b-d",()=>{p1.cr=true;},()=>{p1.cr=false;}); sBt("b-a",()=>{atk(p1,p2,false);}); sBt("b-s",()=>{atk(p1,p2,true);});
        window.addEventListener("keydown",e=>{ if(!gAc)return; if(e.key==="ArrowLeft"||e.key==="a"){keys.l=true;p1.f=-1;} if(e.key==="ArrowRight"||e.key==="d"){keys.r=true;p1.f=1;} if(e.key==="ArrowUp"||e.key==="w")p1.jp(); if(e.key==="ArrowDown"||e.key==="s")p1.cr=true; if(e.key==="f")atk(p1,p2,false); if(e.key==="g")atk(p1,p2,true); });
        window.addEventListener("keyup",e=>{ if(e.key==="ArrowLeft"||e.key==="a")keys.l=false; if(e.key==="ArrowRight"||e.key==="d")keys.r=false; if(e.key==="ArrowDown"||e.key==="s")p1.cr=false; });
        function loop() {
            if (gAc) {
                ctx.clearRect(0, 0, cvs.width, cvs.height); if(keys.l)p1.vx=-3; if(keys.r)p1.vx=3; p1.up(); if(pAtkTime>0) pAtkTime--;
                if(cMd!=='sand'){
                    let isH=cMd==='cpu2', sp=isH?1.8:0.8, ac=isH?0.06:0.015, dist=Math.abs(p2.x-p1.x);
                    if(p2.x<pf.x||p2.x>pf.x+pf.w){ if(Math.random()<0.04)p2.jp(); }
                    if(isH&&pAtkTime>0&&dist<50&&Math.random()<0.4){ if(Math.random()<0.5)p2.jp();else p2.cr=true; }else{ if(Math.random()<0.1)p2.cr=false; }
                    let tx=p1.x; if(isH && (p1.x<pf.x||p1.x>pf.x+pf.w)){ tx=p1.x<pf.x?pf.x-10:pf.x+pf.w-10; }
                    if(p2.x<tx){p2.x+=sp;p2.f=1;}else if(p2.x>tx+5){p2.x-=sp;p2.f=-1;}
                    if(dist<38&&Math.random()<ac){ p2.cr=false; atk(p2,p1,isH?Math.random()<0.4:Math.random()<0.25); }
                }
                p2.up(); ctx.fillStyle="#555"; ctx.fillRect(pf.x, pf.y, pf.w, pf.h); p1.dr(); p2.dr();
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
